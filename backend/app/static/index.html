<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Traffic Incident Response Planning</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="input-panel" aria-label="Incident input">
          <div class="brand-block">
            <p class="eyebrow">Bengaluru Traffic</p>
            <h1>Incident Response Planner</h1>
          </div>

          <form id="incidentForm" class="incident-form">
            <label>
              Event Type
              <select id="event_type" name="event_type" required></select>
            </label>

            <label>
              Event Cause
              <select id="event_cause" name="event_cause" required></select>
            </label>

            <label>
              Vehicle Type
              <select id="veh_type" name="veh_type" required></select>
            </label>

            <label>
              Priority
              <select id="priority" name="priority" required></select>
            </label>

            <label class="toggle-row">
              <span>Authenticated</span>
              <input id="authenticated" name="authenticated" type="checkbox" checked />
            </label>

            <div class="latlon-grid">
              <label>
                Latitude
                <input id="latitude" name="latitude" type="number" step="0.000001" value="12.971599" required />
              </label>
              <label>
                Longitude
                <input id="longitude" name="longitude" type="number" step="0.000001" value="77.594566" required />
              </label>
            </div>

            <label>
              Incident Datetime
              <input id="incident_datetime" name="incident_datetime" type="datetime-local" required />
            </label>

            <button type="submit" id="predictButton">Run Prediction</button>
          </form>

          <div class="context-strip" id="contextStrip">
            <span>Corridor: -</span>
            <span>Zone: -</span>
            <span>Station: -</span>
          </div>
        </aside>

        <section class="map-column">
          <div id="inputMap" class="map-surface" aria-label="Incident location map"></div>
          <div class="dashboard-grid">
            <section class="metric-band">
              <article>
                <span>Closure Probability</span>
                <strong id="closure_probability">-</strong>
              </article>
              <article>
                <span>Impact Score</span>
                <strong id="impact_score">-</strong>
              </article>
              <article>
                <span>Impact Class</span>
                <strong id="impact_class">-</strong>
              </article>
              <article>
                <span>Priority</span>
                <strong id="response_priority">-</strong>
              </article>
            </section>

            <section class="details-grid">
              <article class="panel">
                <h2>Resource Plan</h2>
                <dl id="resourcePlan"></dl>
              </article>
              <article class="panel">
                <h2>Response Plan</h2>
                <dl id="responsePlan"></dl>
              </article>
              <article class="panel">
                <h2>Traffic Forecast</h2>
                <dl id="trafficForecast"></dl>
              </article>
              <article class="panel">
                <h2>Diversion Plan</h2>
                <dl id="diversionPlan"></dl>
              </article>
            </section>

            <section class="route-section">
              <div id="routeMap" class="map-surface compact" aria-label="Diversion route map"></div>
            </section>

            <section class="feedback-panel">
              <div>
                <h2>Post-Event Feedback</h2>
                <p id="feedbackStatus">Submit the actual field outcome after the incident is resolved.</p>
              </div>
              <form id="feedbackForm" class="feedback-form">
                <label class="toggle-row">
                  <span>Road Closure Happened</span>
                  <input id="actual_road_closure" type="checkbox" />
                </label>
                <label>
                  Actual Delay Minutes
                  <input id="actual_delay_mins" type="number" min="0" step="1" placeholder="0" />
                </label>
                <label>
                  Field Notes
                  <input id="feedback_notes" type="text" placeholder="Optional operational note" />
                </label>
                <button type="submit" id="feedbackButton">Submit Feedback</button>
              </form>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    ></script>
    <script src="/static/app.js"></script>
  </body>
</html>
